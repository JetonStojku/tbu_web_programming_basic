<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lesson 4 - Contact</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles/style.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark topbar">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">Lesson 4</a>
      <div class="collapse navbar-collapse show" id="mainMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="services.html">Services</a></li>
          <li class="nav-item"><a class="nav-link" href="portfolio.html">Portfolio</a></li>
          <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-5">
    <h1 class="mb-4">Contact</h1>
    <form class="row g-3 contact-form">
      <div class="col-md-6">
        <label for="name" class="form-label">Name</label>
        <input id="name" type="text" class="form-control" placeholder="Your name" />
      </div>
      <div class="col-md-6">
        <label for="email" class="form-label">Email</label>
        <input id="email" type="email" class="form-control" placeholder="you@example.com" />
      </div>
      <div class="col-12">
        <label for="message" class="form-label">Message</label>
        <textarea id="message" class="form-control" rows="4"></textarea>
      </div>
      <div class="col-12 d-flex gap-2">
        <button type="submit" class="btn btn-primary">Send</button>
        <button type="reset" class="btn btn-outline-secondary">Reset</button>
      </div>
    </form>
  </main>

  <footer class="site-footer py-3 text-center">
    <small>&copy; 2026 TBU Web Programming Basic</small>
  </footer>
</body>
</html>
