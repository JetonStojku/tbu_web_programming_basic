<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movie DB Demo - Home</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles/style.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark movie-navbar">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">Movie DB Demo</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainMenu" aria-controls="mainMenu" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link active" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="movies.html">Movies</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <header class="hero py-5 text-center">
    <div class="container">
      <h1 class="display-5 fw-bold mb-3">Static Movie Database</h1>
      <p class="lead mb-4">Bootstrap 5 demo with movie cards, details, comments, and ratings.</p>
      <a href="movies.html" class="btn btn-warning btn-lg">Browse All Movies</a>
    </div>
  </header>

  <main class="container py-4">
    <h2 class="h4 mb-3">Featured Movies</h2>
    <div class="row g-4">
      <div class="col-md-6 col-lg-4">
        <a href="details.html#ff10" class="text-decoration-none">
          <div class="card movie-card h-100">
            <img src="images/fast and furious 10.jpg" class="card-img-top" alt="Fast and Furious 10 cover" />
            <div class="card-body">
              <h3 class="h6 mb-1">Fast and Furious 10</h3>
              <p class="small text-muted mb-0">Action / Adventure</p>
            </div>
          </div>
        </a>
      </div>
      <div class="col-md-6 col-lg-4">
        <a href="details.html#jw5" class="text-decoration-none">
          <div class="card movie-card h-100">
            <img src="images/john weak 5.webp" class="card-img-top" alt="John Wick 5 cover" />
            <div class="card-body">
              <h3 class="h6 mb-1">John Wick 5</h3>
              <p class="small text-muted mb-0">Action / Thriller</p>
            </div>
          </div>
        </a>
      </div>
      <div class="col-md-6 col-lg-4">
        <a href="details.html#avatar3" class="text-decoration-none">
          <div class="card movie-card h-100">
            <img src="images/avatar 3.jpg" class="card-img-top" alt="Avatar 3 cover" />
            <div class="card-body">
              <h3 class="h6 mb-1">Avatar 3</h3>
              <p class="small text-muted mb-0">Sci-Fi / Adventure</p>
            </div>
          </div>
        </a>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
