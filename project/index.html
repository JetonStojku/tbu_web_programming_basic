<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movie DB Demo - Home</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles/style.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark movie-navbar">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">Movie DB Demo</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainMenu" aria-controls="mainMenu" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link active" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="movies.html">Movies</a></li>
          <li class="nav-item"><a class="nav-link" href="details.html">Details</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <header class="hero py-5 text-center">
    <div class="container">
      <h1 class="display-5 fw-bold mb-3">Static Movie Database</h1>
      <p class="lead mb-4">A Bootstrap 5 demonstration project with movie cards, details, comments and ratings.</p>
      <a href="movies.html" class="btn btn-warning btn-lg">Browse Movies</a>
    </div>
  </header>

  <main class="container py-4">
    <div class="row g-4">
      <div class="col-md-6 col-lg-3">
        <div class="card movie-card h-100">
          <img src="images/fast and furious 10.jpg" class="card-img-top" alt="Fast and Furious 10 cover" />
          <div class="card-body">
            <h2 class="h6">Fast and Furious 10</h2>
            <p class="small text-muted mb-0">Action / Adventure</p>
          </div>
        </div>
      </div>
      <div class="col-md-6 col-lg-3">
        <div class="card movie-card h-100">
          <img src="images/john weak 5.webp" class="card-img-top" alt="John Wick cover" />
          <div class="card-body">
            <h2 class="h6">John Wick 5</h2>
            <p class="small text-muted mb-0">Action / Thriller</p>
          </div>
        </div>
      </div>
      <div class="col-md-6 col-lg-3">
        <div class="card movie-card h-100">
          <img src="images/last breathe.jpg" class="card-img-top" alt="Last Breathe cover" />
          <div class="card-body">
            <h2 class="h6">Last Breathe</h2>
            <p class="small text-muted mb-0">Drama</p>
          </div>
        </div>
      </div>
      <div class="col-md-6 col-lg-3">
        <div class="card movie-card h-100">
          <img src="images/meg.webp" class="card-img-top" alt="Meg cover" />
          <div class="card-body">
            <h2 class="h6">The Meg</h2>
            <p class="small text-muted mb-0">Sci-Fi / Action</p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
